<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="weather-box">
        <h1 class="title">Weather App</h1>
        <div class="search-box">
            <input type="text" placeholder="Enter City Name" spellcheck="false">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="weather-temprature"><img class="weather-icon" src="images/weather.png" alt="">
            <div class="weather-details">
                <h1 class="temperature">-34°C</h1>
                <h2 class="city">Lahore</h2>
            </div>
        </div>
        <div class="row more-details">
            <div class="row humidity"><img class="humidityimg" src="images/humidity.png" alt="">
                <div class="col">
                    <h2>50%</h2>
                    <h3>Humidity</h3>
                </div>
            </div>
            <div class="row wind"><img class="windimg" src="images/wind.png" alt="">
                <div class="col">
                    <h2>15km/h</h2>
                    <h3>Wind Speed</h3>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
